<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furisoa AI</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #000;
  --text-dark: #fff;
  --bg-light: #f5f5f7;
  --text-light: #111;
  --accent: #0071e3;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: background 0.4s ease, color 0.4s ease;
  overflow-x: hidden;
}

body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}

body.light {
  background: var(--bg-light);
  color: var(--text-light);
}

nav {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  z-index: 1000;
}

nav h2 {
  font-weight: 600;
}

.toggle {
  cursor: pointer;
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 14px;
}

header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

header h1 {
  font-size: 4rem;
  font-weight: 700;
  letter-spacing: -1px;
}

header p {
  font-size: 1.4rem;
  margin-top: 20px;
  opacity: 0.8;
}

.countdown {
  display: flex;
  gap: 30px;
  margin-top: 40px;
  font-size: 1.2rem;
}

.countdown div {
  text-align: center;
}

.countdown span {
  font-size: 2rem;
  font-weight: 600;
}

button.primary {
  margin-top: 40px;
  padding: 14px 32px;
  border-radius: 30px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button.primary:hover {
  opacity: 0.85;
}

section {
  padding: 120px 20px;
  text-align: center;
  max-width: 900px;
  margin: auto;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body class="dark">

<canvas id="particles"></canvas>

<nav>
  <h2>Furisoa AI</h2>
  <div class="toggle" onclick="toggleMode()">Toggle Mode</div>
</nav>

<header>
  <h1>Furisoa AI</h1>
  <p>The Next Evolution of Intelligence.</p>

  <div class="countdown">
    <div><span id="days">0</span><br>Days</div>
    <div><span id="hours">0</span><br>Hours</div>
    <div><span id="minutes">0</span><br>Minutes</div>
    <div><span id="seconds">0</span><br>Seconds</div>
  </div>

  <button class="primary">Coming July 2026</button>
</header>

<section>
  <h2>Designed for the Future</h2>
  <p style="margin-top:20px; font-size:18px; opacity:0.8;">
    Furisoa AI combines performance, intelligence, and minimalism into a seamless digital experience — inspired by precision engineering and elegant simplicity.
  </p>
</section>

<script>
// Dark / Light Toggle
function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// Countdown to July 1, 2026
const launchDate = new Date("July 1, 2026 00:00:00").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const distance = launchDate - now;

  document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
  document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
}, 1000);

// Particle Background
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: Math.random() * 0.5 - 0.25,
    speedY: Math.random() * 0.5 - 0.25
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
    if (p.y > canvas.height || p.y < 0) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();
</script>

</body>
</html>
